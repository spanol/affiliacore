# Firebase App Hosting — runtime config
# https://firebase.google.com/docs/app-hosting/configure
#
# Stack: Express (server.ts via tsx) envolvendo um SPA Vite/React.
# Build:  npm run build  -> dist/   (buildpack genérico de Node.js)
# Start:  npm start       -> tsx server.ts (serve dist/ + /api/* em produção)

runConfig:
  # Tool administrativo interno: cold start é aceitável, então minInstances: 0 economiza.
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Faz o server.ts servir dist/ estático (em vez de subir o Vite em middleware).
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # Base da API externa de afiliados (não é segredo).
  - variable: VITE_AFFILIATE_API_BASE_URL
    value: https://affiliate-api-prd.partnersotg.com
    availability:
      - RUNTIME

  # P2 (produtização): módulo OTG por instância. NESTA instância (Carlos) fica ligado.
  # Numa instância white-label OTG-free, troque para 'false' — precisa de BUILD e
  # RUNTIME (a flag vale no bundle do cliente E nas rotas do servidor).
  - variable: VITE_OTG_ENABLED
    value: 'true'
    availability:
      - BUILD
      - RUNTIME

  # P3/P4.1 (produtização): marca por instância. Os defaults do repo são a marca do
  # PRODUTO (AffiliaCore); cada instância declara os VITE_BRAND_* no seu
  # apphosting.<ambiente>.yaml (ver scripts/provision/README.md). A marca Boost da
  # instância do Carlos vive em apphosting.boost.yaml (ambiente `boost`, associado
  # ao backend boost-agency-server no console em 2026-07-05).

  # Credenciais do Firebase Admin SDK (conteúdo do service-account.json).
  # Criar com:  firebase apphosting:secrets:set firebase-service-account-key
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: firebase-service-account-key
    availability:
      - RUNTIME

  # Chave x-api-key da API externa de afiliados (injetada server-side no proxy).
  # Criar com:  firebase apphosting:secrets:set affiliate-api-key
  - variable: AFFILIATE_API_KEY
    secret: affiliate-api-key
    availability:
      - RUNTIME

  # Secret do cron interno (POST /api/internal/daily-ranking). Um Cloud Scheduler bate
  # nesse endpoint 1×/dia (~14h30 BR) com o header x-cron-secret p/ gerar o ranking do
  # dia + avisar os admins. Sem o secret a rota responde 503.
  # Criar com:  firebase apphosting:secrets:set ranking-cron-secret
  - variable: RANKING_CRON_SECRET
    secret: ranking-cron-secret
    availability:
      - RUNTIME

  # E-mail do admin MASTER que recebe o lembrete diário do ranking (popup). Secret
  # p/ não commitar PII no repo; vazio/ausente = lembrete vai a todos os admins.
  # Criar com:  firebase apphosting:secrets:set master-admin-email
  - variable: MASTER_ADMIN_EMAIL
    secret: master-admin-email
    availability:
      - RUNTIME

  # Credenciais do Supabase de provisionamento da OTG (pull automático do roster
  # de aprovados — links.otgpartners). Server-only; nunca expor ao browser.
  # Criar com:  firebase apphosting:secrets:set otg-links-*
  - variable: OTG_LINKS_SUPABASE_URL
    secret: otg-links-supabase-url
    availability:
      - RUNTIME
  - variable: OTG_LINKS_SUPABASE_ANON_KEY
    secret: otg-links-supabase-anon-key
    availability:
      - RUNTIME
  - variable: OTG_LINKS_EMAIL
    secret: otg-links-email
    availability:
      - RUNTIME
  - variable: OTG_LINKS_PASSWORD
    secret: otg-links-password
    availability:
      - RUNTIME

  # Credenciais da v1 ANALÍTICA da OTG (cliques + funil inicial + NGR; rota
  # POST /api/analytics/refresh → GET {BASE}/api/v1/agency/{casa}-analytics).
  # Server-only; nunca expor ao browser. Ver SPIKE-OTG-V1-ANALYTICS.md.
  # AUTH DURÁVEL (2026-06-25): o servidor loga (POST /api/v1/auth/login
  # {email,password,deviceToken}) e cacheia o access_token (~15 min) em memória. O
  # deviceToken (= localStorage 2fa:login, ~8h) PULA o 2FA — renová-lo a cada ~8h é a
  # única manutenção. Criar/atualizar os secrets com:
  #   firebase apphosting:secrets:set otg-dash-email
  #   firebase apphosting:secrets:set otg-dash-password
  #   firebase apphosting:secrets:set otg-dash-device-token
  # (OTG_DASH_ACCESS_TOKEN — override manual de 15 min — foi removido daqui; é só p/ dev.)
  - variable: OTG_DASH_API_BASE
    value: https://affiliate-api-prd.partnersotg.com
    availability:
      - RUNTIME
  - variable: OTG_DASH_EMAIL
    secret: otg-dash-email
    availability:
      - RUNTIME
  - variable: OTG_DASH_PASSWORD
    secret: otg-dash-password
    availability:
      - RUNTIME
  - variable: OTG_DASH_DEVICE_TOKEN
    secret: otg-dash-device-token
    availability:
      - RUNTIME
  # Casas a puxar (slugs, CSV) — não é segredo, inline.
  - variable: OTG_DASH_HOUSES
    value: sportingbet,superbet
    availability:
      - RUNTIME
