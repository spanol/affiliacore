# Instância CLIENTE · Infinity — projeto Firebase `infinity-affiliacore`.
#
# Ativação (one-time, console do projeto infinity-affiliacore): App Hosting →
# backend → Settings → Environment → nome `infinity` → Save. Playbook completo
# em scripts/provision/README.md. Admin inicial provisório: viniciusspanol@gmail.com
# (trocar assim que o cliente indicar o e-mail definitivo).
env:
  # OTG-free: padrão de venda white-label; roda 100% em casas manuais.
  - variable: VITE_OTG_ENABLED
    value: 'false'
    availability:
      - BUILD
      - RUNTIME

  # Marketplace de acordos/parcerias (P2/P3): módulo opt-in (default OFF no repo →
  # a Boost/instância nº 0 NÃO ganha as telas). A Infinity pediu, então liga aqui.
  # Reverter = trocar p/ 'false' (ou remover) e re-rollout. Ver src/lib/instance.ts.
  - variable: VITE_MARKETPLACE_ENABLED
    value: 'true'
    availability:
      - BUILD
      - RUNTIME

  # Marca do cliente.
  - variable: VITE_BRAND_NAME
    value: 'Infinity'
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_BRAND_SHORT
    value: 'Infinity'
    availability:
      - BUILD
      - RUNTIME

  # Placeholders servidos pelo próprio bundle (public/infinity/* → dist/). SEM
  # estas envs o resolver de branding cai no fallback do produto e a instância
  # do cliente sobe exibindo o logo da AffiliaCore. Trocar pela URL dos assets
  # oficiais quando o cliente entregar (env, zero rebuild).
  - variable: VITE_BRAND_LOGO_URL
    value: '/infinity/logo.svg'
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_BRAND_FAVICON_URL
    value: '/infinity/favicon.svg'
    availability:
      - BUILD
      - RUNTIME

  # Roxo principal passado pelo cliente. A engine gera a escala accent-* +
  # contraste WCAG em runtime. Canvas/surface seguem o tema base por enquanto.
  - variable: VITE_BRAND_ACCENT
    value: '#8332B9'
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: 'infinity-affiliacore.firebasestorage.app'
    availability:
      - RUNTIME

  # FIREBASE_SERVICE_ACCOUNT_KEY: override plain para cair em ADC no runtime da
  # App Hosting sem depender da geração manual da chave JSON neste 1º rollout.
  # O server.ts trata valor não-JSON como placeholder e volta para ADC.
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    value: 'unused'
    availability:
      - RUNTIME

  # --- Neutralização dos secrets OTG do apphosting.yaml base -----------------
  # O base referencia secrets que SÓ existem no projeto da instância 0 (Carlos).
  # Instância OTG-free sobrepõe com plain 'unused' (NUNCA string vazia — env
  # vazio reprova na validação do rollout). Ver apphosting.demo.yaml.
  - variable: AFFILIATE_API_KEY
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_LINKS_SUPABASE_URL
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_LINKS_SUPABASE_ANON_KEY
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_LINKS_EMAIL
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_LINKS_PASSWORD
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_DASH_EMAIL
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_DASH_PASSWORD
    value: 'unused'
    availability:
      - RUNTIME
  - variable: OTG_DASH_DEVICE_TOKEN
    value: 'unused'
    availability:
      - RUNTIME

  # Lembrete do ranking (o base referencia o secret master-admin-email, que não
  # existe neste projeto — override plain com o admin provisório da instância).
  - variable: MASTER_ADMIN_EMAIL
    value: 'viniciusspanol@gmail.com'
    availability:
      - RUNTIME

  # FIREBASE_SERVICE_ACCOUNT_KEY e RANKING_CRON_SECRET seguem como SECRETS do
  # base — criar os dois no projeto infinity-affiliacore (playbook §3).
