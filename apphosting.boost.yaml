# Instância BOOST (Carlos) — override por ambiente do App Hosting.
# Ativação (one-time, console): App Hosting → backend `boost-agency-server` →
# Settings → Environment → nome `boost` → Save. A partir daí o build desta
# instância mescla este arquivo sobre o apphosting.yaml base (específico vence).
#
# PROPÓSITO (inversão produto ⇄ instância): a marca Boost fica PINADA aqui,
# explícita — quando os defaults do repo virarem a marca do PRODUTO (pós-escolha
# do nome, ver PRODUTIZACAO.md), esta instância não muda um pixel.
env:
  - variable: VITE_OTG_ENABLED
    value: 'true'
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_BRAND_NAME
    value: 'Agência Boost'
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_BRAND_SHORT
    value: 'Boost'
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_BRAND_LOGO_URL
    value: '/boost-home/logo.svg'
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_BRAND_FAVICON_URL
    value: '/boost-home/favicon.svg'
    availability:
      - BUILD
      - RUNTIME

  # P3.2: estilo glass pinado explicitamente (é o default do produto hoje, mas o
  # pin garante que a instância do Carlos não muda se o default do repo mudar).
  - variable: VITE_BRAND_STYLE
    value: 'glass'
    availability:
      - BUILD
      - RUNTIME

  # P5.1 (flip de cores, 2026-07-07): o apphosting.yaml BASE agora define o tema
  # do PRODUTO (AffiliaCore ember: ACCENT/CANVAS/SURFACE). A Boost fica no look
  # ORIGINAL (amber + neutral + navy = defaults do index.css): 'none' NÃO é
  # palavra mágica — é só uma string que não é hex, e os resolvers de
  # theming.ts tratam qualquer não-hex como AUSENTE (contrato testado em
  # theming.test.ts). NÃO trocar por um hex amber: a engine gera ramp ≠ paleta
  # Tailwind exata (a instância deixaria de ser pixel-idêntica). Plano B, se
  # algo surpreender no rollout: tirar o tema do base e declará-lo só nos yaml
  # POR instância (o base fica sem VITE_BRAND_ACCENT/CANVAS/SURFACE).
  - variable: VITE_BRAND_ACCENT
    value: 'none'
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_BRAND_CANVAS
    value: 'none'
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_BRAND_SURFACE
    value: 'none'
    availability:
      - BUILD
      - RUNTIME
